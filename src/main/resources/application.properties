spring.application.name=diary-chat-api
spring.config.import=optional:file:.env[.properties]

# Server
server.port=${API_PORT:8080}

# Database
spring.datasource.url=jdbc:mysql://${MYSQL_HOST:localhost}:${MYSQL_PORT:3306}/${MYSQL_DATABASE:diary_chat}?serverTimezone=Asia/Seoul&characterEncoding=UTF-8
spring.datasource.username=${MYSQL_USER:diary_chat}
spring.datasource.password=${MYSQL_PASSWORD:diary_chat_password}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA
spring.jpa.hibernate.ddl-auto=${DDL_AUTO:update}
spring.jpa.open-in-view=false
spring.jpa.show-sql=false

# OpenAI
spring.ai.openai.api-key=${OPENAI_API_KEY:local-placeholder}
