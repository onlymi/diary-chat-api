services:
  mysql:
    image: mysql:8.4
    container_name: diary-chat-mysql
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${MYSQL_DATABASE:-diary_chat}
      MYSQL_USER: ${MYSQL_USER:-diary_chat}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-diary_chat_password}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root_password}
      TZ: Asia/Seoul
    ports:
      - "${MYSQL_PORT:-3306}:3306"
    volumes:
      - mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -u root -p\"$${MYSQL_ROOT_PASSWORD}\" --silent"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 20s

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: diary-chat-api
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      API_PORT: 8080
      MYSQL_HOST: mysql
      MYSQL_PORT: 3306
      MYSQL_DATABASE: ${MYSQL_DATABASE:-diary_chat}
      MYSQL_USER: ${MYSQL_USER:-diary_chat}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-diary_chat_password}
      DDL_AUTO: ${DDL_AUTO:-update}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-local-placeholder}
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET must be set in .env}
      JWT_ACCESS_TOKEN_EXPIRATION: ${JWT_ACCESS_TOKEN_EXPIRATION:-1800000}
      JWT_REFRESH_TOKEN_EXPIRATION: ${JWT_REFRESH_TOKEN_EXPIRATION:-1209600000}
      JAVA_OPTS: ${JAVA_OPTS:-}
      TZ: Asia/Seoul
    ports:
      - "${API_PORT:-8080}:8080"

volumes:
  mysql-data:
